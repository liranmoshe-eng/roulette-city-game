<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ארץ עיר 0.1 🌍</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Heebo',sans-serif;
  min-height:100vh;
  background:#0f0e1a;
  color:#f0eeff;
  direction:rtl;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(108,99,255,.25) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 20%,rgba(236,72,153,.2) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 80%,rgba(52,211,153,.15) 0%,transparent 50%);
  pointer-events:none;
}

/* Screens */
.screen{display:none;position:relative;z-index:1;padding:20px;max-width:900px;margin:0 auto}
.screen.active{display:block}

/* Setup screen */
#setup{text-align:center;padding-top:60px}
#setup h1{
  font-size:2.6em;font-weight:900;
  background:linear-gradient(135deg,#a78bfa,#ec4899,#f59e0b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:8px;
}
#setup p.sub{color:rgba(240,238,255,.55);margin-bottom:30px;font-size:1.1em}
.player-inputs{max-width:400px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.player-row{display:flex;gap:10px;align-items:center}
.player-row input{
  flex:1;padding:12px 16px;border-radius:12px;border:1px solid rgba(108,99,255,.3);
  background:rgba(26,25,40,.9);color:#f0eeff;font-family:inherit;font-size:1em;
  outline:none;transition:border-color .2s;
}
.player-row input:focus{border-color:#a78bfa}
.player-row button{
  width:40px;height:40px;border-radius:50%;border:none;
  background:rgba(239,68,68,.7);color:#fff;font-size:1.3em;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
#addPlayerBtn{
  padding:10px 20px;border-radius:12px;border:2px dashed rgba(108,99,255,.4);
  background:transparent;color:#a78bfa;font-family:inherit;font-size:1em;
  cursor:pointer;transition:border-color .2s,color .2s;
}
#addPlayerBtn:hover{border-color:#a78bfa;color:#fff}
#startBtn{
  margin-top:30px;padding:14px 50px;border-radius:16px;border:none;
  background:linear-gradient(135deg,#6c63ff,#a78bfa);
  color:#fff;font-size:1.2em;font-weight:700;font-family:inherit;
  cursor:pointer;transition:transform .2s,box-shadow .2s;
}
#startBtn:hover{transform:scale(1.05);box-shadow:0 8px 30px rgba(108,99,255,.4)}

/* Game screen */
#game{padding-top:20px}
.top-bar{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:20px;flex-wrap:wrap;gap:10px;
}
.current-turn{
  font-size:1.3em;font-weight:700;
  background:linear-gradient(135deg,#a78bfa,#ec4899);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.scoreboard{display:flex;gap:10px;flex-wrap:wrap}
.score-chip{
  padding:6px 14px;border-radius:20px;
  background:rgba(26,25,40,.85);border:1px solid rgba(108,99,255,.25);
  font-size:.9em;white-space:nowrap;
}
.score-chip.active{border-color:#a78bfa;background:rgba(108,99,255,.15)}

/* Roulettes area */
.roulettes{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;margin-bottom:30px}

/* Roulette */
.roulette-container{text-align:center}
.roulette-container h3{margin-bottom:10px;font-weight:600;color:rgba(240,238,255,.7)}
.roulette-wrapper{position:relative;width:280px;height:280px}
.roulette-pointer{
  position:absolute;top:-18px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;
  border-top:24px solid #f59e0b;z-index:10;filter:drop-shadow(0 2px 6px rgba(245,158,11,.5));
}
.roulette-wheel{
  width:280px;height:280px;border-radius:50%;position:relative;
  transition:transform 4s cubic-bezier(0.17,0.67,0.12,0.99);
  border:4px solid rgba(108,99,255,.4);
  overflow:hidden;
}
.roulette-wheel.spinning{pointer-events:none}

.wheel-segment{
  position:absolute;width:50%;height:50%;
  transform-origin:100% 100%;
  display:flex;align-items:center;justify-content:center;
  clip-path:polygon(0 0, 100% 0, 100% 100%);
}
/* We'll draw segments with canvas instead */

canvas.wheel-canvas{
  width:280px;height:280px;border-radius:50%;cursor:pointer;
  transition:transform 4s cubic-bezier(0.17,0.67,0.12,0.99);
}
canvas.wheel-canvas:hover{filter:brightness(1.05);cursor:pointer}
.roulette-wrapper{cursor:pointer}

.spin-btn{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:60px;height:60px;border-radius:50%;border:3px solid rgba(255,255,255,.3);
  background:linear-gradient(135deg,#6c63ff,#a78bfa);
  color:#fff;font-weight:900;font-size:.75em;font-family:inherit;
  cursor:pointer;z-index:5;
  box-shadow:0 4px 20px rgba(108,99,255,.5);
  transition:transform .2s;
  display:flex;align-items:center;justify-content:center;
  text-align:center;line-height:1.1;
}
.spin-btn:hover{transform:translate(-50%,-50%) scale(1.1)}
.spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:translate(-50%,-50%)}

/* Result display */
.result-area{
  text-align:center;min-height:200px;
  background:rgba(26,25,40,.7);border-radius:20px;
  padding:24px;border:1px solid rgba(108,99,255,.15);
}
.result-display{
  font-size:1.8em;font-weight:700;margin-bottom:6px;
  min-height:50px;display:flex;align-items:center;justify-content:center;gap:12px;
}
.result-letter{
  display:inline-flex;align-items:center;justify-content:center;
  width:60px;height:60px;border-radius:16px;
  background:linear-gradient(135deg,#f59e0b,#f97316);
  font-size:1.4em;color:#fff;
}
.result-category{
  display:inline-flex;align-items:center;justify-content:center;
  padding:8px 20px;border-radius:16px;
  background:linear-gradient(135deg,#6c63ff,#a78bfa);
  font-size:.8em;color:#fff;
}
.result-instruction{color:rgba(240,238,255,.55);font-size:1em;margin-bottom:16px}

.answer-area{display:none;margin-top:16px}
.answer-area input{
  padding:14px 20px;border-radius:14px;border:1px solid rgba(108,99,255,.3);
  background:rgba(26,25,40,.9);color:#f0eeff;font-family:inherit;font-size:1.1em;
  width:100%;max-width:400px;outline:none;text-align:center;
}
.answer-area input:focus{border-color:#a78bfa}
.answer-buttons{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.btn{
  padding:12px 28px;border-radius:14px;border:none;
  font-family:inherit;font-size:1em;font-weight:700;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
}
.btn:hover{transform:scale(1.04)}
.btn-correct{background:linear-gradient(135deg,#10b981,#34d399);color:#fff}
.btn-wrong{background:linear-gradient(135deg,#ef4444,#f87171);color:#fff}
.btn-pass{background:rgba(255,255,255,.1);color:rgba(240,238,255,.7);border:1px solid rgba(255,255,255,.15)}
.btn-submit{background:linear-gradient(135deg,#6c63ff,#a78bfa);color:#fff}

/* Feedback messages */
.feedback-msg{
  font-size:1.6em;font-weight:900;margin:20px 0;
  animation:feedbackPop .5s ease;
}
.feedback-msg.correct{color:#34d399}
.feedback-msg.wrong{color:#f59e0b;font-size:1.3em}
@keyframes feedbackPop{0%{transform:scale(0);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}

/* Surprise question */
.surprise-question{
  font-size:1.3em;font-weight:700;margin:16px 0;
  color:#f59e0b;
  animation:pulseText 1.5s ease infinite;
}
@keyframes pulseText{0%,100%{opacity:1}50%{opacity:.7}}

/* Confetti */
.confetti-piece{
  position:fixed;z-index:9999;pointer-events:none;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-10px) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* Smiley rain */
.smiley-drop{
  position:fixed;z-index:9999;pointer-events:none;font-size:2em;
  animation:smileyFall linear forwards;
}
@keyframes smileyFall{
  0%{transform:translateY(-40px) scale(1);opacity:1}
  100%{transform:translateY(100vh) scale(.5);opacity:0}
}

/* Responsive */
@media(max-width:650px){
  .roulettes{gap:20px}
  .roulette-wrapper{width:220px;height:220px}
  canvas.wheel-canvas{width:220px;height:220px}
  .spin-btn{width:50px;height:50px;font-size:.65em}
  .result-display{font-size:1.3em}
  #setup h1{font-size:2em}
}
</style>
</head>

// Build a Set for fast lookup (normalized: trimmed, no extra spaces)
const answerSets = {};
for (const cat in answerDB) {
  answerSets[cat] = new Set(answerDB[cat].map(a => a.trim()));
}

// ===== STATE =====
let players = [];
let scores = [];
let currentPlayer = 0;
let selectedCategory = null;
let selectedLetter = null;
let catAngle = 0;
let letAngle = 0;
let catSpinning = false;
let letSpinning = false;
let isSurprise = false;

// ===== SETUP =====
function addPlayer() {
  const container = document.getElementById('playerInputs');
  const count = container.children.length + 1;
  const row = document.createElement('div');
  row.className = 'player-row';
  row.innerHTML = `<input type="text" placeholder="שחקן ${count}" maxlength="20"><button onclick="removePlayer(this)">✕</button>`;
  container.appendChild(row);
}

function removePlayer(btn) {
  const container = document.getElementById('playerInputs');
  if (container.children.length > 2) {
    btn.parentElement.remove();
  }
}

function startGame() {
  const inputs = document.querySelectorAll('#playerInputs input');
  players = [];
  inputs.forEach((inp, i) => {
    const name = inp.value.trim() || `שחקן ${i+1}`;
    players.push(name);
  });
  if (players.length < 2) return;
  scores = players.map(() => 0);
  currentPlayer = 0;

  document.getElementById('setup').classList.remove('active');
  document.getElementById('game').classList.add('active');

  drawWheel('categoryWheel', categories, catColors);
  drawWheel('letterWheel', hebrewLetters, letterColors);
  updateUI();
}

// ===== DRAW WHEEL =====
function drawWheel(canvasId, items, colors) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 4;
  const n = items.length;
  const arc = 2 * Math.PI / n;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < n; i++) {
    const startAngle = i * arc - Math.PI / 2;
    const endAngle = startAngle + arc;

    // segment
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.15)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + arc / 2);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + (n > 10 ? '20px' : '26px') + ' Heebo';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(items[i], r * 0.6, 0);
    ctx.restore();
  }

  // center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 38, 0, 2 * Math.PI);
  ctx.fillStyle = '#1a1928';
  ctx.fill();
  ctx.strokeStyle = 'rgba(108,99,255,.5)';
  ctx.lineWidth = 3;
  ctx.stroke();
}

// ===== SPIN =====
function spinWheel(canvasId, items, currentAngle, callback) {
  const canvas = document.getElementById(canvasId);
  const n = items.length;
  const extraSpins = 5 + Math.random() * 5;
  const randomStop = Math.random() * 360;
  const totalRotation = extraSpins * 360 + randomStop;
  const newAngle = currentAngle + totalRotation;

  canvas.style.transition = 'transform 4s cubic-bezier(0.17,0.67,0.12,0.99)';
  canvas.style.transform = `rotate(${newAngle}deg)`;

  // figure out which segment the pointer (at top) lands on
  setTimeout(() => {
    const normalizedAngle = newAngle % 360;
    const segmentSize = 360 / n;
    // pointer is at top (270 deg in math coords = 0 in visual)
    // the wheel rotates clockwise, so segment at top:
    const idx = Math.floor(((360 - normalizedAngle % 360) % 360) / segmentSize);
    callback(items[idx], newAngle);
  }, 4200);

  return newAngle;
}

function spinCategory() {
  if (catSpinning) return;
  catSpinning = true;
  selectedCategory = null;
  document.getElementById('spinCatBtn').disabled = true;
  updateResultDisplay();

  catAngle = spinWheel('categoryWheel', categories, catAngle, (result, angle) => {
    catAngle = angle;
    selectedCategory = result;
    catSpinning = false;
    document.getElementById('spinCatBtn').disabled = false;
    isSurprise = (selectedCategory === 'משהו מפתיע');
    checkBothSpun();
  });
}

function spinLetter() {
  if (letSpinning) return;
  letSpinning = true;
  selectedLetter = null;
  document.getElementById('spinLetBtn').disabled = true;
  updateResultDisplay();

  letAngle = spinWheel('letterWheel', hebrewLetters, letAngle, (result, angle) => {
    letAngle = angle;
    selectedLetter = result;
    letSpinning = false;
    document.getElementById('spinLetBtn').disabled = false;
    checkBothSpun();
  });
}

function checkBothSpun() {
  updateResultDisplay();
  if (selectedCategory !== null && selectedLetter !== null) {
    showAnswerArea();
  }
}

function updateResultDisplay() {
  const rd = document.getElementById('resultDisplay');
  let html = '';
  if (selectedCategory) {
    html += `<span class="result-category">${selectedCategory}</span>`;
  }
  if (selectedLetter) {
    html += `<span class="result-letter">${selectedLetter}</span>`;
  }
  if (!selectedCategory && !selectedLetter) {
    html = '<span style="color:rgba(240,238,255,.4)">סובבו את שתי הרולטות!</span>';
  }
  rd.innerHTML = html;
}

function showAnswerArea() {
  const area = document.getElementById('answerArea');
  const inst = document.getElementById('resultInstruction');
  const btns = document.getElementById('answerButtons');
  const input = document.getElementById('answerInput');
  area.style.display = 'block';
  input.value = '';

  if (isSurprise) {
    const q = surpriseQuestions[Math.floor(Math.random() * surpriseQuestions.length)];
    inst.innerHTML = `<div class="surprise-question">🎉 שאלת הפתעה: ${q}</div>`;
    input.placeholder = 'כתבו את התשובה שלכם...';
    btns.innerHTML = `
      <button class="btn btn-submit" onclick="submitSurprise()">✨ קבל תשובה</button>
    `;
  } else {
    inst.textContent = `כתבו ${selectedCategory} שמתחיל/ה באות ${selectedLetter}`;
    input.placeholder = `${selectedCategory} באות ${selectedLetter}...`;
    btns.innerHTML = `
      <button class="btn btn-submit" onclick="checkAnswer()">🔍 בדוק תשובה</button>
    `;
  }
  input.focus();
}

// ===== ANSWERS =====
// Map final-form letters to their normal form for comparison
const finalToNormal = {'ך':'כ','ם':'מ','ן':'נ','ף':'פ','ץ':'צ'};
function normalizeHebrew(ch) {
  return finalToNormal[ch] || ch;
}

function checkAnswer() {
  const answer = document.getElementById('answerInput').value.trim();
  if (!answer) { document.getElementById('answerInput').focus(); return; }

  const firstChar = normalizeHebrew(answer.charAt(0));
  const targetLetter = normalizeHebrew(selectedLetter);

  // Check 1: first letter must match
  if (firstChar !== targetLetter) {
    showFeedback(false, `התשובה צריכה להתחיל באות ${selectedLetter}`);
    return;
  }

  // Check 2: answer must be in the category database
  const set = answerSets[selectedCategory];
  if (set && set.has(answer)) {
    scores[currentPlayer]++;
    showFeedback(true);
    fireConfetti();
    fireSmileyRain();
  } else {
    showFeedback(false, `"${answer}" לא נמצא במאגר של ${selectedCategory}`);
  }
}

function showFeedback(isCorrect, detail) {
  const inst = document.getElementById('resultInstruction');
  const ansArea = document.getElementById('answerArea');
  ansArea.style.display = 'none';
  if (isCorrect) {
    inst.innerHTML = '<div class="feedback-msg correct">🎉 כל הכבוד! 🎉</div>';
  } else {
    const detailHtml = detail ? `<br><span style="font-size:.7em;color:rgba(240,238,255,.55)">${detail}</span>` : '';
    inst.innerHTML = `<div class="feedback-msg wrong">💪 לא נורא, כל יום לומדים דברים חדשים!${detailHtml}</div>`;
  }
  setTimeout(() => nextTurn(), 3000);
}

function submitSurprise() {
  const answer = document.getElementById('answerInput').value.trim();
  if (!answer) { document.getElementById('answerInput').focus(); return; }
  scores[currentPlayer]++;
  showFeedback(true);
  fireConfetti();
  fireSmileyRain();
}

function passTurn() {
  nextTurn();
}

function nextTurn() {
  selectedCategory = null;
  selectedLetter = null;
  isSurprise = false;
  currentPlayer = (currentPlayer + 1) % players.length;
  document.getElementById('answerArea').style.display = 'none';
  document.getElementById('resultInstruction').textContent = '';
  updateResultDisplay();
  updateUI();
}

function updateUI() {
  document.getElementById('turnDisplay').textContent = `🎯 התור של: ${players[currentPlayer]}`;
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = players.map((p, i) =>
    `<div class="score-chip ${i === currentPlayer ? 'active' : ''}">${p}: ${scores[i]}</div>`
  ).join('');
}

// ===== CONFETTI =====
function fireConfetti() {
  const colors = ['#6c63ff','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#a78bfa','#34d399'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-10px';
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (2 + Math.random() * 3) + 's';
    el.style.animationDelay = (Math.random() * 1.5) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
}

function fireSmileyRain() {
  const smileys = ['😄','😊','🥳','😎','🤩','😁','🎉','✨','💫','⭐'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'smiley-drop';
    el.textContent = smileys[Math.floor(Math.random() * smileys.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-40px';
    el.style.animationDuration = (2 + Math.random() * 3) + 's';
    el.style.animationDelay = (Math.random() * 2) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 6000);
  }
}

// Enter key submits answer
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('answerArea').style.display === 'block') {
    if (isSurprise) submitSurprise();
    else checkAnswer();
  }
});
